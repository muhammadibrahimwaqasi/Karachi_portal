name: karachi_portal
description: Commissioner Karachi Portal - Official App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & API
  http: ^1.2.0
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  
  # Image picker
  image_picker: ^1.1.1
  
  # URL Launcher (for View on Map)
  url_launcher: ^6.2.0

  # Misc
  intl: ^0.19.0
  hijri: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/emblem.png
    - assets/logo.png
    - assets/logo1.png
    - assets/logo2.png
    - assets/header_bg.png
    - assets/footer_skyline.png
  
  fonts:
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
